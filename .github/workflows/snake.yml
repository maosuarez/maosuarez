name: Generate Snake Animation

on:
  # Ejecuta diariamente a medianoche UTC
  schedule:
    - cron: "0 0 * * *"

  # Permite ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:

  # Ejecuta en cada push a main (opcional, puedes comentar si prefieres solo diario)
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Genera el archivo SVG de la serpiente
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: maosuarez
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg?palette=github-light

      # Publica el SVG generado a la rama 'output'
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
